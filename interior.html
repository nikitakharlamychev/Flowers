<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Студия «ВАНИЛЬ» — Оформление интерьера</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Iconify -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <!-- Шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <!-- Стили -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-stone-50 text-stone-800 selection:bg-rose-200/50">

    <!-- Навигация -->
    <nav class="fixed top-0 left-0 right-0 z-40 bg-white/80 backdrop-blur-xl border-b border-stone-200/50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="index.html" class="nav-back">
                <iconify-icon icon="solar:arrow-left-linear" class="text-lg"></iconify-icon> На главную
            </a>
            <button onclick="toggleCart()" class="relative p-2 text-stone-500 hover:text-stone-900 transition-colors">
                <iconify-icon icon="solar:cart-large-minimalistic-linear" class="text-xl"></iconify-icon>
                <span id="cartBadge" class="absolute top-1 right-0 bg-[#E11D48] text-white rounded-full w-4 h-4 text-[0.625rem] flex items-center justify-center font-medium hidden ring-2 ring-white">0</span>
            </button>
        </div>
    </nav>

    <!-- Страница: Калькулятор интерьера -->
    <div id="interiorPage" class="min-h-screen pt-28 pb-20 px-6">
        <div class="max-w-4xl mx-auto">
            <div class="text-center mb-16">
                <h1 class="font-serif text-3xl md:text-5xl font-medium tracking-tight text-stone-900 mb-4">Оформление интерьера</h1>
                <p class="text-stone-500 font-light text-base md:text-lg">Предварительный расчет стоимости проекта</p>
            </div>
            
            <div class="bg-white rounded-3xl shadow-sm border border-stone-200/60 p-6 md:p-10">
                <form id="interiorForm" class="space-y-12" onsubmit="event.preventDefault(); openOrderFormInterior();">
                    <!-- 1. Тип объекта -->
                    <div>
                        <label class="block text-sm font-medium text-stone-900 mb-5 uppercase tracking-wider">1. Тип объекта</label>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                            <label class="cursor-pointer group relative">
                                <input type="radio" name="roomType" value="office" class="peer sr-only" checked>
                                <div class="p-5 border border-stone-200 rounded-2xl text-center peer-checked:border-[#10B981] peer-checked:bg-[#ECFDF5] transition-all group-hover:border-stone-300 h-full flex flex-col items-center justify-center gap-3">
                                    <iconify-icon icon="solar:sofa-linear" class="text-2xl text-stone-400 peer-checked:text-[#10B981] transition-colors"></iconify-icon>
                                    <div class="text-xs font-medium text-stone-700 peer-checked:text-[#10B981]">Офис</div>
                                </div>
                            </label>
                            <label class="cursor-pointer group relative">
                                <input type="radio" name="roomType" value="restaurant" class="peer sr-only">
                                <div class="p-5 border border-stone-200 rounded-2xl text-center peer-checked:border-[#10B981] peer-checked:bg-[#ECFDF5] transition-all group-hover:border-stone-300 h-full flex flex-col items-center justify-center gap-3">
                                    <iconify-icon icon="solar:utensils-linear" class="text-2xl text-stone-400 peer-checked:text-[#10B981] transition-colors"></iconify-icon>
                                    <div class="text-xs font-medium text-stone-700 peer-checked:text-[#10B981]">Ресторан</div>
                                </div>
                            </label>
                            <label class="cursor-pointer group relative">
                                <input type="radio" name="roomType" value="home" class="peer sr-only">
                                <div class="p-5 border border-stone-200 rounded-2xl text-center peer-checked:border-[#10B981] peer-checked:bg-[#ECFDF5] transition-all group-hover:border-stone-300 h-full flex flex-col items-center justify-center gap-3">
                                    <iconify-icon icon="solar:home-angle-linear" class="text-2xl text-stone-400 peer-checked:text-[#10B981] transition-colors"></iconify-icon>
                                    <div class="text-xs font-medium text-stone-700 peer-checked:text-[#10B981]">Дом / Квартира</div>
                                </div>
                            </label>
                            <label class="cursor-pointer group relative">
                                <input type="radio" name="roomType" value="other" class="peer sr-only">
                                <div class="p-5 border border-stone-200 rounded-2xl text-center peer-checked:border-[#10B981] peer-checked:bg-[#ECFDF5] transition-all group-hover:border-stone-300 h-full flex flex-col items-center justify-center gap-3">
                                    <iconify-icon icon="solar:question-circle-linear" class="text-2xl text-stone-400 peer-checked:text-[#10B981] transition-colors"></iconify-icon>
                                    <div class="text-xs font-medium text-stone-700 peer-checked:text-[#10B981]">Иной объект</div>
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- 2. Площадь -->
                    <div>
                        <div class="flex items-baseline justify-between mb-5">
                            <label class="block text-sm font-medium text-stone-900 uppercase tracking-wider">2. Площадь</label>
                            <div class="flex items-center gap-2">
                                <input type="number" id="areaInput" min="1" max="500" value="50" class="w-20 px-3 py-1.5 text-right text-lg font-serif tracking-tight text-stone-900 bg-stone-50 border border-stone-200 rounded-lg focus:ring-1 focus:ring-[#10B981] focus:border-[#10B981] outline-none transition-all" oninput="syncAreaFromInput(this.value)">
                                <span class="text-sm text-stone-500">м²</span>
                            </div>
                        </div>
                        <div class="slider-wrapper">
                            <input type="range" id="areaRange" min="1" max="500" value="50" step="1" class="w-full" oninput="syncAreaFromSlider(this.value)">
                        </div>
                        <div class="flex justify-between text-xs text-stone-400 mt-2 px-1">
                            <span>1 м²</span>
                            <span>500 м²</span>
                        </div>
                    </div>

                    <!-- 3. Масштаб озеленения -->
                    <div>
                        <label class="block text-sm font-medium text-stone-900 mb-5 uppercase tracking-wider">3. Масштаб озеленения</label>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <button type="button" onclick="selectDensity('light', 1000)" class="density-btn p-5 border border-stone-200 rounded-2xl text-left hover:border-stone-300 bg-white transition-all" id="density-light">
                                <div class="font-medium text-stone-900 mb-1">Точечное</div>
                                <p class="text-xs text-stone-500 leading-relaxed">Акцентные композиции в ключевых зонах</p>
                            </button>
                            <button type="button" onclick="selectDensity('medium', 2000)" class="density-btn p-5 border border-stone-200 rounded-2xl text-left hover:border-stone-300 bg-white transition-all" id="density-medium">
                                <div class="font-medium text-stone-900 mb-1">Стандартное</div>
                                <p class="text-xs text-stone-500 leading-relaxed">Заполнение нескольких зон, фотозона</p>
                            </button>
                            <button type="button" onclick="selectDensity('dense', 3500)" class="density-btn p-5 border border-stone-200 rounded-2xl text-left hover:border-stone-300 bg-white transition-all" id="density-dense">
                                <div class="font-medium text-stone-900 mb-1">Плотное</div>
                                <p class="text-xs text-stone-500 leading-relaxed">Полное флористическое покрытие пространства</p>
                            </button>
                        </div>
                    </div>

                    <!-- Портфолио -->
                    <div id="portfolioSection" class="hidden pt-4 border-t border-stone-100">
                        <label class="block text-sm font-medium text-stone-900 mb-5 uppercase tracking-wider">Примеры (<span id="densityLabel">точечное</span>)</label>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="portfolioGrid"></div>
                    </div>

                    <!-- 4. Опции -->
                    <div>
                        <label class="block text-sm font-medium text-stone-900 mb-5 uppercase tracking-wider">4. Опции</label>
                        <div class="space-y-3">
                            <label class="flex items-start gap-3 p-4 border border-stone-200 rounded-xl cursor-pointer hover:bg-stone-50 hover:border-stone-300 transition-colors group">
                                <input type="checkbox" id="decoratorVisit" class="custom-checkbox w-4 h-4 mt-0.5 border border-stone-300 rounded text-[#10B981]" onchange="calculateInteriorPrice()">
                                <div class="flex-1">
                                    <div class="text-sm font-medium text-stone-800 group-hover:text-stone-900">Выезд декоратора</div>
                                    <div class="text-xs text-stone-500 mt-0.5">Осмотр и замеры (Бесплатно)</div>
                                </div>
                            </label>
                            <label class="flex items-start gap-3 p-4 border border-stone-200 rounded-xl cursor-pointer hover:bg-stone-50 hover:border-stone-300 transition-colors group">
                                <input type="checkbox" id="legalEntity" class="custom-checkbox w-4 h-4 mt-0.5 border border-stone-300 rounded text-[#10B981]" onchange="calculateInteriorPrice()">
                                <div class="flex-1">
                                    <div class="text-sm font-medium text-stone-800 group-hover:text-stone-900">Работа с юрлицом</div>
                                    <div class="text-xs text-stone-500 mt-0.5">Договор, счёт, НДС</div>
                                </div>
                            </label>
                            <label class="flex items-start gap-3 p-4 border border-stone-200 rounded-xl cursor-pointer hover:bg-stone-50 hover:border-stone-300 transition-colors group">
                                <input type="checkbox" id="urgentInterior" class="custom-checkbox w-4 h-4 mt-0.5 border border-stone-300 rounded text-[#10B981]" onchange="calculateInteriorPrice()">
                                <div class="flex-1">
                                    <div class="text-sm font-medium text-stone-800 group-hover:text-stone-900">Срочный проект</div>
                                    <div class="text-xs text-stone-500 mt-0.5">Реализация за 3 дня (+20%)</div>
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- Итог -->
                    <div class="bg-stone-50 p-8 rounded-2xl flex flex-col md:flex-row items-center justify-between gap-6 border border-stone-100">
                        <div>
                            <div class="text-xs text-stone-500 uppercase tracking-wider mb-1">Ориентировочно</div>
                            <div class="text-3xl md:text-4xl font-serif font-medium tracking-tight text-[#10B981]" id="interiorTotalPrice">от 50 000 ₽</div>
                        </div>
                        <button type="submit" class="w-full md:w-auto btn-secondary whitespace-nowrap">
                            Оставить заявку
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Модальные окна (корзина, форма, успех) - те же, что в index.html -->
    <div id="cartModal" class="modal fixed inset-0 z-50 items-center justify-center p-4 bg-stone-900/40 backdrop-blur-sm">
        <div class="modal-content bg-white rounded-3xl shadow-xl max-w-md w-full p-8 relative border border-stone-200/50">
            <button onclick="toggleCart()" class="absolute top-5 right-5 text-stone-400 hover:text-stone-600 transition-colors p-1">
                <iconify-icon icon="solar:close-circle-linear" class="text-2xl"></iconify-icon>
            </button>
            <h2 class="font-serif text-2xl font-medium tracking-tight text-stone-900 mb-6">Корзина</h2>
            <div id="cartItems" class="space-y-3 mb-6 max-h-60 overflow-y-auto pr-2"></div>
            <div class="border-t border-stone-100 pt-5">
                <div class="flex justify-between items-end mb-6">
                    <span class="text-stone-500 text-sm">Итого</span>
                    <span id="cartTotal" class="text-xl font-serif font-medium tracking-tight text-stone-900">0 ₽</span>
                </div>
                <button onclick="openOrderFromCart()" class="w-full btn-primary">Оформить заказ</button>
            </div>
        </div>
    </div>

    <div id="orderFormModal" class="modal fixed inset-0 z-50 items-center justify-center p-4 bg-stone-900/40 backdrop-blur-sm">
        <div class="modal-content bg-white rounded-3xl shadow-xl max-w-md w-full p-8 relative border border-stone-200/50">
            <button onclick="closeOrderForm()" class="absolute top-5 right-5 text-stone-400 hover:text-stone-600 transition-colors p-1">
                <iconify-icon icon="solar:close-circle-linear" class="text-2xl"></iconify-icon>
            </button>
            <h2 class="font-serif text-2xl font-medium tracking-tight text-stone-900 mb-6 text-center">Оформление</h2>
            <form id="orderForm" class="space-y-4" onsubmit="submitOrder(event)">
                <div><input type="text" id="customerName" required class="w-full px-4 py-3 bg-stone-50 border border-stone-200 rounded-xl focus:ring-1 focus:ring-[#E11D48] focus:border-[#E11D48] outline-none transition-all text-sm text-stone-800 placeholder:text-stone-400" placeholder="Ваше имя"></div>
                <div><input type="tel" id="phoneInput" required pattern="^[\d\+\s\-\(\)]{10,}$" class="w-full px-4 py-3 bg-stone-50 border border-stone-200 rounded-xl focus:ring-1 focus:ring-[#E11D48] focus:border-[#E11D48] outline-none transition-all text-sm text-stone-800 placeholder:text-stone-400" placeholder="Телефон *"></div>
                <div><input type="text" id="socialInput" class="w-full px-4 py-3 bg-stone-50 border border-stone-200 rounded-xl focus:ring-1 focus:ring-[#E11D48] focus:border-[#E11D48] outline-none transition-all text-sm text-stone-800 placeholder:text-stone-400" placeholder="Telegram / WhatsApp / VK"></div>
                <div><textarea id="orderComment" class="w-full px-4 py-3 bg-stone-50 border border-stone-200 rounded-xl focus:ring-1 focus:ring-[#E11D48] focus:border-[#E11D48] outline-none transition-all text-sm text-stone-800 placeholder:text-stone-400 resize-none" rows="3" placeholder="Комментарий к заказу"></textarea></div>
                <div class="pt-2"><button type="submit" id="submitBtn" class="w-full btn-primary">Подтвердить</button></div>
            </form>
        </div>
    </div>

    <div id="successModal" class="modal fixed inset-0 z-50 items-center justify-center p-4 bg-stone-900/40 backdrop-blur-sm">
        <div class="modal-content bg-white rounded-3xl shadow-xl max-w-sm w-full p-8 text-center border border-stone-200/50">
            <div class="w-16 h-16 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-6">
                <iconify-icon icon="solar:check-circle-linear" class="text-3xl text-[#10B981]"></iconify-icon>
            </div>
            <h2 class="font-serif text-2xl font-medium tracking-tight text-stone-900 mb-2">Заказ принят!</h2>
            <p class="text-sm text-stone-500 mb-8 font-light">Мы свяжемся с вами в ближайшее время для уточнения деталей.</p>
            <div class="bg-stone-50 rounded-2xl p-5 mb-6 text-left border border-stone-100">
                <h3 class="text-xs font-medium text-stone-400 mb-3 uppercase tracking-wider">Контакты студии</h3>
                <div class="space-y-3">
                    <a href="tel:+79814226103" class="flex items-center gap-3 text-sm text-stone-600 hover:text-stone-900 transition-colors"><iconify-icon icon="solar:phone-linear" class="text-lg text-[#E11D48] opacity-80"></iconify-icon><span>+7 (981) 422-61-03</span></a>
                    <a href="https://t.me/HnikitaH" target="_blank" class="flex items-center gap-3 text-sm text-stone-600 hover:text-stone-900 transition-colors"><iconify-icon icon="solar:letter-linear" class="text-lg text-[#E11D48] opacity-80"></iconify-icon><span>@HnikitaH</span></a>
                </div>
            </div>
            <button onclick="closeSuccessModal()" class="w-full btn-primary">ОК</button>
        </div>
    </div>

    <!-- Скрипты -->
    <script src="script.js"></script>
</body>
</html>
